  .utility{font-family:'Inter',sans-serif;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;background:none;color:inherit;}
  a{color:inherit;}
  button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--rust-light);outline-offset:2px;}

  .topbar{background:var(--lagoon);color:var(--sand);padding:18px 18px 22px;position:relative;overflow:hidden;}

  .eyebrow{font-family:'Inter',sans-serif;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin:0 0 4px;}

  .topbar-actions{display:flex;gap:8px;}
  .pill-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:var(--sand);border-radius:20px;padding:7px 12px;font-size:12px;font-weight:600;letter-spacing:0.03em;display:flex;align-items:center;gap:5px;}

  .bungalow-select{display:flex;background:var(--lagoon-light);border-top:1px solid rgba(255,255,255,0.08);position:relative;z-index:1;}
  .bungalow-select button{flex:1;padding:10px 0;font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:15px;color:rgba(243,236,220,0.55);border-right:1px solid rgba(0,0,0,0.18);position:relative;}

  .subtabs::-webkit-scrollbar{display:none;}
  .subtab-chip{flex-shrink:0;background:var(--foam);border:1.5px solid var(--sand-deep);border-radius:20px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:700;color:var(--grey);white-space:nowrap;}
  .subtab-chip.active{background:var(--lagoon);color:var(--sand);border-color:var(--lagoon);}

  main{padding:6px 18px 18px;max-width:560px;margin:0 auto;}
  .section-title{font-size:22px;margin:0 0 14px;color:var(--lagoon);}
  .card{background:var(--foam);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(21,51,45,0.08);}
  .muted{color:#8b8378;font-size:13px;font-family:'Inter',sans-serif;}
  .empty-card{border:1.5px dashed var(--sand-deep);background:transparent;box-shadow:none;color:#a39c8e;font-family:'Inter',sans-serif;font-size:13px;text-align:center;padding:18px;}

  .wifi-row:last-child{border-bottom:none;}
  .wifi-label{font-family:'Inter',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:#8b8378;}
  .wifi-value{font-family:'Inter',sans-serif;font-weight:600;font-size:18px;color:var(--lagoon);}

  .icon-btn:hover{background:var(--sand-deep);}
  .help-line{display:flex;gap:8px;align-items:center;font-family:'Inter',sans-serif;font-size:13px;margin-top:4px;color:var(--grey);}

  .info-grid{display:flex;gap:10px;margin-bottom:14px;}

  .info-tile .stencil{font-size:20px;}
  .info-tile .utility{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px;}

  ul.clean li:last-child{border-bottom:none;}
  ul.clean li .dot{color:var(--rust);font-family:'Inter',sans-serif;}
  .contact-card{background:var(--lagoon);color:var(--sand);}
  .contact-card a{font-family:'Inter',sans-serif;font-weight:700;font-size:19px;color:var(--gold);text-decoration:none;}

  .freeform-text{font-size:15px;line-height:1.55;white-space:pre-line;}

  .filters{display:flex;gap:8px;overflow-x:auto;padding:0 0 4px;margin-bottom:4px;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .filter-chip{flex-shrink:0;background:var(--foam);border:1.5px solid var(--sand-deep);border-radius:20px;padding:7px 13px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:var(--grey);white-space:nowrap;}
  .filter-chip.active{background:var(--lagoon);color:var(--sand);border-color:var(--lagoon);}
  .filter-chip:hover:not(.active){background:var(--sand-deep);}

  .cat-title{font-family:'Inter',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:var(--rust);margin:22px 0 10px;}

  .place-card{display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .place-name{font-family:'Inter',sans-serif;font-weight:700;font-size:15px;color:var(--lagoon);}
  .place-meta{display:flex;gap:6px;align-items:center;margin-top:2px;flex-wrap:wrap;}
  .place-rating{font-size:12px;color:var(--gold);font-family:'Inter',sans-serif;}
  .place-badge{font-size:10px;font-family:'Inter',sans-serif;font-weight:700;background:var(--sand);color:var(--grey);border-radius:4px;padding:2px 6px;text-transform:uppercase;letter-spacing:0.05em;}
  .place-note{font-size:14px;margin:5px 0 0;}
  .place-link{flex-shrink:0;background:var(--rust);color:#fff;border-radius:8px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;text-decoration:none;white-space:nowrap;}
  .place-link:hover{background:var(--rust-light);}
  .new-badge{background:var(--rust);color:#fff;font-size:9px;font-weight:800;border-radius:4px;padding:2px 6px;letter-spacing:0.05em;}

  .stars{display:flex;gap:6px;margin:10px 0 16px;}
  .star{font-size:30px;color:var(--sand-deep);line-height:1;}
  .star.filled{color:var(--gold);}
  textarea,input[type=text]{width:100%;font-family:'Inter',sans-serif;font-size:15px;border:1px solid var(--sand-deep);border-radius:10px;padding:11px;margin-bottom:12px;background:var(--sand);color:var(--grey);}

  .submit-btn{width:100%;background:var(--rust);color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:15px;padding:13px;border-radius:10px;}

  .avg-num{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:36px;color:var(--lagoon);}

  .review-stars{color:var(--gold);font-size:13px;}
  .review-text{font-size:14px;margin:5px 0 0;}

  .allergy-row:last-of-type{border-bottom:none;}
  .allergy-info{display:flex;flex-direction:column;gap:2px;}
  .allergy-name{font-family:'Inter',sans-serif;font-weight:600;font-size:15px;color:var(--lagoon);}
  .allergy-note{font-size:12px;}
  .allergy-cb{width:22px;height:22px;accent-color:var(--rust);flex-shrink:0;}
  .allergy-checked{background:#FBF3EA;margin:0 -16px;padding:11px 16px;}

  .allergy-custom-input{margin-bottom:0;}

  .rule-row{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--sand-deep);}
  .rule-row:last-child{border-bottom:none;}
  .rule-label{font-family:'Inter',sans-serif;font-weight:600;font-size:15px;color:var(--lagoon);}
  .rule-status{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;border-radius:14px;padding:5px 12px;white-space:nowrap;}
  .rule-yes{background:#EAF3ED;color:var(--ok);}
  .rule-no{background:#FBEAE6;color:var(--warn);}
  .rule-num{background:var(--sand);color:var(--lagoon);}

  .tabbar{position:fixed;bottom:0;left:0;right:0;background:var(--lagoon);display:flex;z-index:10;padding-bottom:env(safe-area-inset-bottom);overflow-x:auto;}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 2px 9px;font-family:'Inter',sans-serif;font-size:10.5px;font-weight:600;color:rgba(243,236,220,0.5);position:relative;border-right:1px solid rgba(0,0,0,0.2);min-width:58px;}
  .tabbar button:last-child{border-right:none;}
  .tabbar button .ic{font-size:18px;}
  .tabbar button.active{color:var(--sand);}
  .tabbar button.active::after{content:"";position:absolute;top:0;left:18%;right:18%;height:3px;background:var(--rust);border-radius:0 0 3px 3px;}

  .modal{position:fixed;inset:0;background:rgba(21,51,45,0.78);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal.hidden{display:none;}
  .modal-card{background:#fff;border-radius:16px;padding:26px 22px;text-align:center;max-width:320px;}
  .modal-card p{font-size:14px;color:var(--grey);margin:14px 0 18px;}
  #qrcode{display:flex;justify-content:center;margin:0 auto;}
  .modal-close{background:var(--lagoon);color:#fff;border-radius:10px;padding:10px 20px;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;}

  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>

let state={lang:"fr",bungalow:1,tab:"wifi",passVisible:false,justSubmitted:false,activeFilter:"all"};
function t(){return I18N[state.lang];}
function currentBungalow(){return BUNGALOWS.find(b=>b.id===state.bungalow);}

function renderChrome(){
  document.getElementById("eyebrowTxt").textContent=t().eyebrow;
  document.getElementById("bungalowWord").textContent=t().bungalowWord;
  document.getElementById("bungalowNum").textContent=String(state.bungalow).padStart(2,"0");
  document.getElementById("langToggle").innerHTML="🌐 "+(state.lang==="fr"?"EN":"FR");
  document.getElementById("qrBtnLabel").textContent=t().qrLabel;
  document.getElementById("qrInstructions").textContent=t().qrInstructions;
  document.getElementById("closeQr").textContent=t().close;
  Object.entries(t().tabs).forEach(([k,v])=>{const el=document.getElementById("lbl-"+k);if(el)el.textContent=v;});
  const sel=document.getElementById("bungalowSelect");
  sel.innerHTML="";
  BUNGALOWS.forEach(b=>{
    const btn=document.createElement("button");
    btn.textContent=String(b.id).padStart(2,"0");
    if(b.id===state.bungalow)btn.classList.add("active");
    btn.onclick=()=>{state.bungalow=b.id;state.passVisible=false;state.justSubmitted=false;renderAll();};
    sel.appendChild(btn);
  });
  document.querySelectorAll(".tabbar button").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===state.tab));
}

function renderWifi(){
  const b=currentBungalow();const L=t().wifi;
  return`<div class="card">
    <p class="section-title" style="margin-bottom:10px;">${L.title}</p>
    <div class="wifi-row">
      <div><p class="wifi-label">${L.ssid}</p><p class="wifi-value">${b.ssid}</p></div>
      <button class="icon-btn" onclick="copyText('${b.ssid}',this,'${L.copy}','${L.copied}')">${L.copy}</button>
    </div>
    <div class="wifi-row">
      <div><p class="wifi-label">${L.pass}</p><p class="wifi-value">${state.passVisible?b.pass:"•".repeat(b.pass.length)}</p></div>
      <div style="display:flex;gap:6px;">
        <button class="icon-btn" onclick="togglePass()">${state.passVisible?L.hide:L.show}</button>
        <button class="icon-btn" onclick="copyText('${b.pass}',this,'${L.copy}','${L.copied}')">${L.copy}</button>
      </div>
    </div>
  </div>
  <p class="help-line">📞 ${L.help} : <a href="tel:${CONTACT_PHONE.replace(/\s/g,'')}" style="font-weight:700;">${CONTACT_PHONE}</a></p>`;
}
function togglePass(){state.passVisible=!state.passVisible;render();}
function copyText(text,btn,label,copiedLabel){
  navigator.clipboard.writeText(text).then(()=>{
    const old=btn.textContent;btn.textContent=copiedLabel;
    setTimeout(()=>{btn.textContent=old===copiedLabel?label:old;},1400);
  }).catch(()=>alert(text));
}

function renderLogement(){
  const b=currentBungalow();const L=t().logement;
  const li=arr=>arr.map(x=>`<li><span class="dot">—</span>${x}</li>`).join("");
  const extra=b.equipementsExtra||[];
  const extraBlock = extra.length
    ? `<div class="card"><p class="section-title" style="font-size:17px;margin-bottom:6px;">${L.equipExtraTitle}</p><ul class="clean">${li(extra.map(x=>x[state.lang]))}</ul></div>`
    : `<div class="card empty-card">${L.equipExtraTitle} — ${state.lang==="fr"?"aucun élément renseigné pour le moment":"nothing added yet"}</div>`;
  const proprioTxt = (b.infosProprietaire && b.infosProprietaire[state.lang]) ? b.infosProprietaire[state.lang] : "";
  const proprioBlock = proprioTxt
    ? `<div class="card"><p class="section-title" style="font-size:17px;margin-bottom:8px;">${L.proprioTitle}</p><p class="freeform-text">${proprioTxt}</p></div>`
    : `<div class="card empty-card">${L.proprioTitle} — ${L.proprioEmpty}</div>`;
  return`<div class="info-grid">
    <div class="info-tile"><span class="utility">${L.checkin}</span><p class="stencil" style="margin:0;">${b.checkin}</p></div>
    <div class="info-tile"><span class="utility">${L.checkout}</span><p class="stencil" style="margin:0;">${b.checkout}</p></div>
  </div>
  ${proprioBlock}
  <div class="card"><p class="section-title" style="font-size:17px;margin-bottom:6px;">${L.equipTitle}</p><ul class="clean">${li(L.equip)}</ul></div>
  ${extraBlock}
  <div class="card"><p class="section-title" style="font-size:17px;margin-bottom:6px;">${L.servicesTitle}</p><ul class="clean">${li(L.services)}</ul></div>
  <div class="card contact-card">
    <p class="section-title" style="font-size:17px;color:var(--sand);margin-bottom:8px;">${L.contactTitle}</p>

    <p style="font-size:13px;margin:8px 0 0;color:rgba(243,236,220,0.75);">${L.onsite}</p>
  </div>`;
}

function renderReglement(){
  const b=currentBungalow();const L=t().reglement;
  const r=b.reglement||{};
  let fetesHtml;
  if(r.fetesAutorisees===true) fetesHtml=`<span class="rule-status rule-yes">${L.yes}</span>`;
  else if(r.fetesAutorisees===false) fetesHtml=`<span class="rule-status rule-no">${L.no}</span>`;
  else fetesHtml=`<span class="rule-status rule-num">${L.unset}</span>`;
  let visiteursHtml;
  if(typeof r.visiteursMax==="number") visiteursHtml=`<span class="rule-status rule-num">${r.visiteursMax} ${L.visiteursUnit}</span>`;
  else visiteursHtml=`<span class="rule-status rule-num">${L.visiteursUnset}</span>`;
  const parkingTxt = r.parking ? r.parking : L.parkingUnset;
  const reglesPerso = (r.reglesPerso && r.reglesPerso.length)
    ? `<ul class="clean">${r.reglesPerso.map(x=>`<li><span class="dot">—</span>${x}</li>`).join("")}</ul>`
    : `<p class="muted">${L.reglesEmpty}</p>`;
  const general = L.general.map(x=>`<li><span class="dot">—</span>${x}</li>`).join("");
  return`<p class="section-title">${L.title}</p>
  <p class="muted" style="margin-top:-8px;margin-bottom:14px;">${L.subtitle}</p>
  <div class="card">
    <div class="rule-row"><span class="rule-label">${L.fetes}</span>${fetesHtml}</div>
    <div class="rule-row"><span class="rule-label">${L.visiteurs}</span>${visiteursHtml}</div>
    <div class="rule-row"><span class="rule-label">${L.parking}</span><span class="rule-status rule-num" style="text-align:right;max-width:55%;white-space:normal;">${parkingTxt}</span></div>
  </div>
  <div class="card">
    <p class="section-title" style="font-size:17px;margin-bottom:8px;">${L.reglesTitle}</p>
    ${reglesPerso}
  </div>
  <div class="card">
    <p class="section-title" style="font-size:17px;margin-bottom:6px;">${L.generalTitle}</p>
    <ul class="clean">${general}</ul>
  </div>`;
}

function renderAlentours(){
  const L=t();
  const activeCats=state.activeFilter==="all" ? CAT_KEYS : [state.activeFilter];
  const chips=[
    `<button class="filter-chip ${state.activeFilter==="all"?"active":""}" onclick="setFilter('all')">${L.filterAll}</button>`,
    ...CAT_KEYS.map(k=>`<button class="filter-chip ${state.activeFilter===k?"active":""}" onclick="setFilter('${k}')">${L.catLabels[k]}</button>`)
  ].join("");
  const bonsplansItems = PLACES.bonsplans.length
    ? PLACES.bonsplans.map(p=>`
      <div class="card place-card">
        <div>
          <p class="place-name">${p.name} <span class="new-badge">${state.lang==="fr"?"NOUVEAU":"NEW"}</span></p>
          <div class="place-meta"><span class="place-badge">${p.date[state.lang]}</span></div>
          <p class="place-note">${p.note[state.lang]}</p>
        </div>
      </div>`).join("")
    : `<div class="card empty-card">${L.bonsplansEmpty}</div>`;
  const bonsplansBlock = `<p class="cat-title" style="margin-top:0;">${L.bonsplansTitle}</p>${bonsplansItems}`;
  const cards=activeCats.map(cat=>{
    const items=(PLACES[cat]||[]).length ? PLACES[cat].map(p=>{
      const badge=p.badge?`<span class="place-badge">${p.badge[state.lang]}</span>`:"";
      const ratingTxt = p.rating ? `<span class="place-rating">★ ${p.rating}</span>` : "";
      const mapLink = p.placeId ? `<a class="place-link" target="_blank" rel="noopener" href="https://www.google.com/maps/place/?q=place_id:${p.placeId}">${L.maps}</a>` : "";
      return`<div class="card place-card">
        <div>
          <p class="place-name">${p.name}</p>
          <div class="place-meta">${ratingTxt}${badge}</div>
          <p class="place-note">${p.note[state.lang]}</p>
        </div>
        ${mapLink}
      </div>`;
    }).join("") : `<div class="card empty-card">${state.lang==="fr"?"Rien d'ajouté ici pour le moment":"Nothing added here yet"}</div>`;
    return`<p class="cat-title">${L.catLabels[cat]}</p>${items}`;
  }).join("");
  return`<div class="filters">${chips}</div>${bonsplansBlock}${cards}`;
}
function setFilter(key){state.activeFilter=key;render();}

function renderAllergenes(){
  const L=t().allergenes;
  if(!window._allergyChecked) window._allergyChecked={};
  if(!window._allergyCustom) window._allergyCustom="";
  const rows=L.list.map((a,i)=>{
    const checked=window._allergyChecked[i]||false;
    return`<label class="allergy-row ${checked?"allergy-checked":""}">
      <div class="allergy-info">
        <span class="allergy-name">${a.icon} ${a.name}</span>
        <span class="muted allergy-note">${a.note}</span>
      </div>
      <input type="checkbox" class="allergy-cb" data-idx="${i}" ${checked?"checked":""} onchange="toggleAllergy(${i},this.checked)">
    </label>`;
  }).join("");
  const notes=L.notes.map(n=>`<li><span class="dot">✓</span>${n}</li>`).join("");
  return`<p class="section-title">${L.title}</p>
  <p class="muted" style="margin-top:-8px;margin-bottom:14px;">${L.intro}</p>
  <div class="card">${rows}
    <div class="allergy-custom-row">
      <span class="allergy-name">➕ ${L.customLabel}</span>
      <input type="text" class="allergy-custom-input" placeholder="${L.customPlaceholder}" value="${window._allergyCustom}" oninput="window._allergyCustom=this.value">
    </div>
  </div>
  <div class="card">
    <p class="section-title" style="font-size:17px;margin-bottom:8px;">${L.noteTitle}</p>
    <ul class="clean">${notes}</ul>
  </div>
  <p class="help-line">📞 ${L.contact} : <a href="tel:${CONTACT_PHONE.replace(/\s/g,'')}" style="font-weight:700;">${CONTACT_PHONE}</a></p>`;
}
function toggleAllergy(idx,val){
  if(!window._allergyChecked) window._allergyChecked={};
  window._allergyChecked[idx]=val;
  render();
}

function renderChambre(){
  const L=t().chambre;
  const pmrLi=L.pmrEquip.map(x=>`<li><span class="dot">—</span>${x}</li>`).join("");
  const babyLi=L.babyEquip.map(x=>`<li><span class="dot">—</span>${x}</li>`).join("");
  return`<p class="section-title">${L.title}</p>
  <div class="card">
    <p class="section-title" style="font-size:19px;margin-bottom:4px;">${L.pmrTitle}</p>
    <p class="muted" style="margin-bottom:12px;">${L.pmrDesc}</p>
    <ul class="clean">${pmrLi}</ul>
    <p style="font-size:13px;margin-top:12px;padding:10px;background:var(--sand);border-radius:8px;font-family:'Inter',sans-serif;">${L.pmrNote}</p>
  </div>
  <div class="card">
    <p class="section-title" style="font-size:19px;margin-bottom:4px;">${L.babyTitle}</p>
    <p class="muted" style="margin-bottom:12px;">${L.babyDesc}</p>
    <ul class="clean">${babyLi}</ul>
    <p style="font-size:13px;margin-top:12px;padding:10px;background:var(--sand);border-radius:8px;font-family:'Inter',sans-serif;">${L.babyNote}</p>
  </div>
  <p class="help-line">📞 <a href="tel:${CONTACT_PHONE.replace(/\s/g,'')}" style="font-weight:700;">${CONTACT_PHONE}</a></p>`;
}

let avisDraft={rating:0,name:"",comment:""};
async function loadReviews(id){
  try{const r=await window.storage.get("avis-bungalow-"+id,true);return r?JSON.parse(r.value):[];}
  catch(e){return[];}
}
async function saveReview(id,review){
  const list=await loadReviews(id);list.unshift(review);
  try{await window.storage.set("avis-bungalow-"+id,JSON.stringify(list),true);}
  catch(e){console.error(e);}
}
function renderAvis(){
  const L=t().avis;
  const stars=[1,2,3,4,5].map(n=>`<span class="star ${n<=avisDraft.rating?"filled":""}" onclick="setRating(${n})">★</span>`).join("");
  return`<p class="section-title">${L.title}</p>
  <p class="muted" style="margin-top:-8px;margin-bottom:14px;">${L.subtitle}</p>
  ${state.justSubmitted?`<div class="thanks-msg">✓ ${L.thanks}</div>`:`
  <div class="card">
    <div class="stars">${stars}</div>
    <input type="text" id="avisName" placeholder="${L.name}" value="${avisDraft.name}" oninput="avisDraft.name=this.value">
    <textarea id="avisComment" placeholder="${L.comment}" oninput="avisDraft.comment=this.value">${avisDraft.comment}</textarea>
    <button class="submit-btn" ${avisDraft.rating===0?"disabled":""} onclick="submitAvis()">${L.submit}</button>
  </div>`}
  <div id="reviewsBlock"><p class="muted">…</p></div>`;
}
function setRating(n){avisDraft.rating=n;render();}
async function submitAvis(){
  await saveReview(state.bungalow,{
    rating:avisDraft.rating,
    name:avisDraft.name||(state.lang==="fr"?"Voyageur":"Guest"),
    comment:avisDraft.comment,
    date:new Date().toLocaleDateString(state.lang==="fr"?"fr-FR":"en-GB")
  });
  state.justSubmitted=true;avisDraft={rating:0,name:"",comment:""};render();
}
async function renderReviewsBlock(){
  const block=document.getElementById("reviewsBlock");if(!block)return;
  const L=t().avis;
  const reviews=await loadReviews(state.bungalow);
  if(!reviews.length){block.innerHTML=`<p class="muted">${L.noReviews}</p>`;return;}
  const avg=(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1);
  const items=reviews.slice(0,15).map(r=>`
    <div class="review-item">
      <div class="review-head"><span>${r.name}</span><span class="review-stars">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</span></div>
      ${r.comment?`<p class="review-text">${escapeHtml(r.comment)}</p>`:""}
      <p class="review-date">${r.date}</p>
    </div>`).join("");
  block.innerHTML=`<p class="section-title" style="font-size:17px;">${L.recent}</p>
  <div class="card"><div class="avg-row"><span class="avg-num">${avg}</span><span class="muted">/5 · ${reviews.length} ${L.reviewsWord}</span></div>${items}</div>`;
}
function escapeHtml(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}

function render(){
  const map={wifi:renderWifi,logement:renderLogement,reglement:renderReglement,alentours:renderAlentours,allergenes:renderAllergenes,chambre:renderChambre,avis:renderAvis};
  document.getElementById("tabContent").innerHTML=map[state.tab]();
  if(state.tab==="avis")renderReviewsBlock();
}
function renderAll(){renderChrome();render();}

document.querySelectorAll(".tabbar button").forEach(btn=>{
  btn.addEventListener("click",()=>{state.tab=btn.dataset.tab;renderAll();});
});
document.getElementById("langToggle").addEventListener("click",()=>{
  state.lang=state.lang==="fr"?"en":"fr";renderAll();
});
document.getElementById("qrBtn").addEventListener("click",()=>{
  document.getElementById("qrModal").classList.remove("hidden");
  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"),{text:window.location.href,width:170,height:170,colorDark:"#15332D",colorLight:"#ffffff"});
});
document.getElementById("closeQr").addEventListener("click",()=>{
  document.getElementById("qrModal").classList.add("hidden");
});

renderAll();
</script>
</body>
